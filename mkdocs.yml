site_name: Enterprise Architecture Playbook
site_description: Enterprise Architecture & Cloud Native Knowledge Base
site_author: xadimouSALIH
site_url: https://xadimousalih.github.io/enterprise-architecture-playbook/

repo_name: xadimousalih/enterprise-architecture-playbook
repo_url: https://github.com/xadimousalih/enterprise-architecture-playbook

theme:
  name: material

  logo: assets/logo.png

  favicon: assets/favicon.png

  language: en

  palette:

    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:

    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.expand
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
nav:
  - Home: index.md

  - Framework:
      - Overview: framework/index.md
      - Principles: framework/principles/index.md
      - Governance: framework/governance/index.md
      - Capabilities: framework/capabilities/index.md
      - Reference Architectures: framework/reference-architectures/index.md

  - Architecture:
      - Fundamentals: architecture/fundamentals/index.md

  - Cloud:
      - Overview: cloud/README.md

  - DDD:
      - Overview: ddd/README.md

  - API:
      - Overview: api/README.md

  - Security:
      - Overview: security/README.md

  - AI:
      - Overview: ai/README.md

- Reference Architectures:
    - Overview: reference-architectures/index.md
    - API Platform: reference-architectures/api-platform/index.md
    - Identity Platform: reference-architectures/identity-platform/index.md
    - Event Platform: reference-architectures/event-platform/index.md
    - Data Platform: reference-architectures/data-platform/index.md
    - Observability Platform: reference-architectures/observability-platform/index.md
    - Developer Platform: reference-architectures/developer-platform/index.md
    - Cloud Platform: reference-architectures/cloud-platform/index.md
    - AI Platform: reference-architectures/ai-platform/index.md

- Architecture Patterns:
    - Overview: patterns/index.md
    - API Gateway: patterns/api-gateway/index.md
    - Backend For Frontend: patterns/backend-for-frontend/index.md
    - CQRS: patterns/cqrs/index.md
    - Saga: patterns/saga/index.md
    - Outbox: patterns/outbox/index.md
    - Event Sourcing: patterns/event-sourcing/index.md
    - Circuit Breaker: patterns/circuit-breaker/index.md
    - Retry: patterns/retry/index.md
    - Bulkhead: patterns/bulkhead/index.md
    - Sidecar: patterns/sidecar/index.md
    - Ambassador: patterns/ambassador/index.md
    - Database per Service: patterns/database-per-service/index.md

- Architecture Decisions:
    - Overview: adrs/index.md
    - ADR Template: adrs/templates/adr-template.md
    - Accepted: adrs/accepted/index.md
    - Proposed: adrs/proposed/index.md
    - Deprecated: adrs/deprecated/index.md
    - Superseded: adrs/superseded/index.md



plugins:
  - search

markdown_extensions:
  - admonition

  - pymdownx.details

  - pymdownx.highlight

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.emoji

  - tables

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  social:

    - icon: fontawesome/brands/github
      link: https://github.com/xadimousalih

    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com

  generator: false
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js
