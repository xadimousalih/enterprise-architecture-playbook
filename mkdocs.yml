site_name: Enterprise Architecture Playbook
site_description: Enterprise Architecture & Cloud Native Knowledge Base
site_author: Xadim Ousalih
site_url: https://xadimousalih.github.io/enterprise-architecture-playbook/

repo_name: xadimousalih/enterprise-architecture-playbook
repo_url: https://github.com/xadimousalih/enterprise-architecture-playbook

theme:
  name: material

  logo: assets/logo.png

  favicon: assets/favicon.png

  language: en

  palette:

    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:

    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.expand
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
nav:
  - Home: index.md

  - Framework:
      - Overview: framework/index.md
      - Principles: framework/principles/index.md
      - Governance: framework/governance/index.md
      - Capabilities: framework/capabilities/index.md
      - Reference Architectures: framework/reference-architectures/index.md

  - Architecture:
      - Fundamentals: architecture/fundamentals/index.md

  - Cloud:
      - Overview: cloud/README.md

  - DDD:
      - Overview: ddd/README.md

  - API:
      - Overview: api/README.md

  - Security:
      - Overview: security/README.md

  - AI:
      - Overview: ai/README.md
plugins:
  - search

markdown_extensions:
  - admonition

  - pymdownx.details

  - pymdownx.highlight

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.emoji

  - tables

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  social:

    - icon: fontawesome/brands/github
      link: https://github.com/xadimousalih

    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js
